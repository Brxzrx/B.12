<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{margin:0;background:#000;overflow:hidden;color:#fff;font-family:sans-serif}
canvas{display:block}
#hint{position:absolute;left:50%;top:56%;transform:translate(-50%,-50%);opacity:.8}
</style>
</head>
<body>

<div id="hint">اضغط</div>
<canvas id="c"></canvas>

<script>
const c = document.getElementById('c')
const ctx = c.getContext('2d')
c.width = innerWidth
c.height = innerHeight

let started = false
const N = 12000
const scale = Math.min(innerWidth, innerHeight) * 0.06

const particles = []

function heart(t){
  const x = 16*Math.pow(Math.sin(t),3)
  const y = 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)
  return {x, y}
}

function spawn(){
  for(let i=0;i<N;i++){
    const t = Math.random()*Math.PI*2
    const h = heart(t)

    particles.push({
      x: c.width/2,
      y: c.height/2,
      tx: c.width/2 + h.x*scale,
      ty: c.height/2 - h.y*scale,
      vx: (Math.random()-0.5)*20,
      vy: (Math.random()-0.5)*20,
      jitter: (Math.random()-0.5)*3
    })
  }
}

function loop(){
  ctx.fillStyle = "rgba(0,0,0,0.25)"
  ctx.fillRect(0,0,c.width,c.height)

  if(!started){
    ctx.fillStyle="#fff"
    ctx.beginPath()
    ctx.arc(c.width/2, c.height/2, 3, 0, Math.PI*2)
    ctx.fill()
    requestAnimationFrame(loop)
    return
  }

  ctx.fillStyle="#fff"

  for(const p of particles){
    p.vx *= 0.94
    p.vy *= 0.94

    p.x += p.vx + (p.tx - p.x)*0.02 + (Math.random()-0.5)*p.jitter
    p.y += p.vy + (p.ty - p.y)*0.02 + (Math.random()-0.5)*p.jitter

    ctx.beginPath()
    ctx.arc(p.x, p.y, 1.1, 0, Math.PI*2)
    ctx.fill()
  }

  requestAnimationFrame(loop)
}

loop()

c.onclick = () => {
  if(started) return
  started = true
  document.getElementById("hint").style.display="none"
  spawn()
}
</script>

</body>
</html>
