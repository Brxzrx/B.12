<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{margin:0;background:black;overflow:hidden;color:white;font-family:sans-serif}
canvas{display:block}
#text{
position:absolute;
left:50%;
top:55%;
transform:translate(-50%,-50%);
font-size:22px;
opacity:0.8;
}
</style>
</head>

<body>

<div id="text">اضغط</div>
<canvas id="c"></canvas>

<script>

const canvas=document.getElementById("c")
const ctx=canvas.getContext("2d")

canvas.width=innerWidth
canvas.height=innerHeight

let particles=[]
let started=false
const count=15000
const scale=7

function heart(t){
let x=16*Math.pow(Math.sin(t),3)
let y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)
return {x:x,y:-y}
}

function createParticles(){

for(let i=0;i<count;i++){

let t=Math.random()*Math.PI*2
let p=heart(t)

particles.push({

x:canvas.width/2,
y:canvas.height/2,

tx:canvas.width/2+p.x*scale,
ty:canvas.height/2+p.y*scale,

vx:(Math.random()-0.5)*20,
vy:(Math.random()-0.5)*20

})

}

}

function draw(){

ctx.fillStyle="rgba(0,0,0,0.2)"
ctx.fillRect(0,0,canvas.width,canvas.height)

if(!started){

ctx.fillStyle="white"
ctx.beginPath()
ctx.arc(canvas.width/2,canvas.height/2,3,0,Math.PI*2)
ctx.fill()

requestAnimationFrame(draw)
return
}

ctx.fillStyle="white"

particles.forEach(p=>{

p.vx*=0.95
p.vy*=0.95

p.x+=p.vx+(p.tx-p.x)*0.02
p.y+=p.vy+(p.ty-p.y)*0.02

ctx.beginPath()
ctx.arc(p.x,p.y,1.2,0,Math.PI*2)
ctx.fill()

})

requestAnimationFrame(draw)

}

draw()

canvas.onclick=()=>{

if(started) return

started=true
document.getElementById("text").style.display="none"

createParticles()

}

</script>

</body>
</html>
