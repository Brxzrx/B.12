<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{margin:0;background:#000;overflow:hidden}
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

let scene=new THREE.Scene()

let camera=new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.z=60

let renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

let count=20000
let geometry=new THREE.BufferGeometry()

let positions=new Float32Array(count*3)
let velocities=new Float32Array(count*3)
let tvals=new Float32Array(count)

function heart(t){
let x=16*Math.pow(Math.sin(t),3)
let y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)
return {x:x,y:-y}
}

for(let i=0;i<count;i++){

let t=Math.random()*Math.PI*2
tvals[i]=t

let p=heart(t)

positions[i*3]=p.x*2
positions[i*3+1]=p.y*2
positions[i*3+2]=(Math.random()-0.5)*2

velocities[i*3]=0
velocities[i*3+1]=0
velocities[i*3+2]=0

}

geometry.setAttribute(
"position",
new THREE.BufferAttribute(positions,3)
)

let material=new THREE.PointsMaterial({
color:0xffffff,
size:0.8,
transparent:true,
opacity:0.9
})

let points=new THREE.Points(geometry,material)
scene.add(points)

let explode=false

function animate(){

let pos=geometry.attributes.position.array

for(let i=0;i<count;i++){

tvals[i]+=0.002

let p=heart(tvals[i])

let tx=p.x*2
let ty=p.y*2

let ix=i*3

if(explode){

velocities[ix]+=(Math.random()-0.5)*2
velocities[ix+1]+=(Math.random()-0.5)*2

}

pos[ix]+= (tx-pos[ix])*0.03 + velocities[ix]
pos[ix+1]+= (ty-pos[ix+1])*0.03 + velocities[ix+1]

velocities[ix]*=0.95
velocities[ix+1]*=0.95

}

geometry.attributes.position.needsUpdate=true

renderer.render(scene,camera)

requestAnimationFrame(animate)

}

animate()

window.addEventListener("click",()=>{

explode=true

setTimeout(()=>{
explode=false
},400)

let colors=[
0xffffff,
0xff4d6d,
0xffd166,
0x06d6a0,
0x4cc9f0
]

material.color.setHex(
colors[Math.floor(Math.random()*colors.length)]
)

})

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()
renderer.setSize(window.innerWidth,window.innerHeight)

})

</script>

</body>
</html>
