<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{margin:0;background:black;overflow:hidden}
canvas{display:block}
#txt{
position:absolute;
left:50%;
top:58%;
transform:translate(-50%,-50%);
color:white;
font-family:sans-serif;
}
</style>
</head>

<body>

<div id="txt">اضغط</div>
<canvas id="c"></canvas>

<script>

const canvas=document.getElementById("c")
const ctx=canvas.getContext("2d")

canvas.width=innerWidth
canvas.height=innerHeight

let particles=[]
let started=false
let finger=null

const count=9000
const scale=Math.min(innerWidth,innerHeight)*0.035

function heart(t){

let x=16*Math.pow(Math.sin(t),3)
let y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)

return {x,y}

}

function create(){

particles=[]

for(let i=0;i<count;i++){

let t=Math.random()*Math.PI*2
let p=heart(t)

particles.push({

x:canvas.width/2,
y:canvas.height/2,

tx:canvas.width/2+p.x*scale,
ty:canvas.height/2-p.y*scale,

vx:(Math.random()-0.5)*30,
vy:(Math.random()-0.5)*30,

spread:2+Math.random()*3

})

}

}

function draw(){

ctx.fillStyle="rgba(0,0,0,0.25)"
ctx.fillRect(0,0,canvas.width,canvas.height)

if(!started){

ctx.fillStyle="white"
ctx.beginPath()
ctx.arc(canvas.width/2,canvas.height/2,3,0,Math.PI*2)
ctx.fill()

requestAnimationFrame(draw)
return

}

ctx.fillStyle="white"

particles.forEach(p=>{

p.vx*=0.94
p.vy*=0.94

if(finger){

let dx=finger.x-p.x
let dy=finger.y-p.y

p.vx+=dx*0.0008
p.vy+=dy*0.0008

}

p.x+=p.vx+(p.tx-p.x)*0.02+(Math.random()-0.5)*p.spread
p.y+=p.vy+(p.ty-p.y)*0.02+(Math.random()-0.5)*p.spread

ctx.beginPath()
ctx.arc(p.x,p.y,1.2,0,Math.PI*2)
ctx.fill()

})

requestAnimationFrame(draw)

}

draw()

canvas.onclick=()=>{

started=true
document.getElementById("txt").style.display="none"

create()

}

canvas.addEventListener("touchstart",e=>{
finger={x:e.touches[0].clientX,y:e.touches[0].clientY}
})

canvas.addEventListener("touchmove",e=>{
finger={x:e.touches[0].clientX,y:e.touches[0].clientY}
})

canvas.addEventListener("touchend",()=>{
finger=null
})

canvas.addEventListener("dblclick",()=>{

create()

})

</script>

</body>
</html>
